<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ERP System – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);position:relative;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none}
.orb1{width:400px;height:400px;background:#6c63ff;top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:#ff6584;bottom:-80px;right:-80px}
.card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;position:relative;z-index:10;box-shadow:0 25px 50px rgba(0,0,0,.4)}
.logo{text-align:center;font-size:2.5rem;margin-bottom:.75rem}
h1{font-size:1.8rem;font-weight:800;color:#fff;text-align:center;margin-bottom:.25rem}
.sub{color:rgba(255,255,255,.5);text-align:center;font-size:.9rem;margin-bottom:2rem}
.error{background:rgba(255,80,80,.2);border:1px solid rgba(255,80,80,.4);color:#ff8080;padding:.75rem 1rem;border-radius:10px;font-size:.875rem;margin-bottom:1.25rem}
.field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
label{color:rgba(255,255,255,.7);font-size:.78rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:.8rem 1rem;color:#fff;font-size:.95rem;outline:none;font-family:inherit;transition:border-color .2s,background .2s;width:100%}
input::placeholder{color:rgba(255,255,255,.35)}
input:focus{border-color:#6c63ff;background:rgba(108,99,255,.1)}
.btn{background:linear-gradient(135deg,#6c63ff,#a855f7);color:#fff;border:none;border-radius:10px;padding:.9rem;font-size:1rem;font-weight:600;cursor:pointer;width:100%;margin-top:.75rem;font-family:inherit;transition:opacity .2s,transform .15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="card">
  <div class="logo">⚡</div>
  <h1>ERP System</h1>
  <p class="sub">Sign in to your workspace</p>

  {% if messages %}
    {% for msg in messages %}
      <div class="error">❌ {{ msg }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" required autofocus/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required/>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
</body>
</html>
